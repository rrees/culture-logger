
<form method="POST" action="/log{% if log %}/{{log.key.urlsafe()}}{% endif %}">
<div class="form-group">
	<label for="name">Event name</label>
	<input type="text" name="name" id="name" class="form-control" required
		{% if log and log.name %}value="{{log.name}}"{% endif %}/>
</div>

<div class="form-group">
	<label for="date">Date</label>
	<input type="date" name="date" id="date" class="form-control" required
		{% if log and log.date %}value="{{log.date}}"{% endif %}
		{% if not log and today %}value="{{today}}"{% endif %}/>
</div>

<div class="form-group">
	<label for="rating">Stars</label>
	<select name="rating" class="form-control">
		<option value=""></option>
		{% for i in valid_ratings %}
		<option value="{{i}}" {% if log and log.rating and i == log.rating %}selected{% endif %}>{{i}}</option>
		{% endfor %}
	</select>
</div>

<div class="form-group">
	<label for="tags">Tags</label>
	<input type="text" name="tags" id="tags" class="form-control"
		{% if log and log.tags %}value="{{log.tags | join(" ")}}"{% endif %}/>
</div>

<div class="form-group">
	<label for="category">Category</label>
	<input type="text" name="category" id="category" class="form-control"
		{% if log and log.category %}value="{{log.category}}"{% endif %}/>
</div>

<div class="form-group">
	<label for="notes">Notes</label>
	<textarea id="notes"name="notes" class="form-control" rows="3">{% if log and log.notes %}{{log.notes}}{% endif %}</textarea>
</div>

<div class="form-group">
<button type="submit" class="btn btn-default">Log</button>
</div>

</form>
