
<div class="container-fluid">
	<div class="log-summaries">
	{% for log in logged %}
	<section class="log-summary">
		<header>
			<h2>{{log.name}}<h2>
		</header>
		{% if log.rating %}
		<p><span title="{{log.rating}} star">{{log.rating | stars}}</span></p>
		{% endif %}
		{% if log.notes %}
		<p>{{log.notes}}</p>
		{% endif %}
		{% if log.tags %}
		<p>{{log.tags|join(" ")}}</p>
		{% endif %}
		{% if log.url %}
		<p><a href="{{log.url}}">{{log.url}}</a></p>
		{% endif %}
		<p>{{log.date}}</p>
	</section>
	{% endfor %}
	</div>
</div>
